# Local development compose file.
# The production deployment uses AWS Lambda + SQS + DynamoDB (see template.yaml).
# This file is only used to run the Order Service API locally against a real SQL Server instance.
services:
  # SQL Server — used when UseSqlDatabase=true in appsettings
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: order-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SQL_SA_PASSWORD}
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - order-processing-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/1433'"]
      interval: 15s
      timeout: 30s
      retries: 20
      start_period: 180s

  # Order Service API (local dev — in-memory store, no SQL required by default)
  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service-api
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__OrderDatabase: "Server=sqlserver,1433;Database=OrderServiceDb;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;"
      UseSqlDatabase: "false"
    networks:
      - order-processing-network
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

networks:
  order-processing-network:
    driver: bridge

volumes:
  sqlserver-data:
